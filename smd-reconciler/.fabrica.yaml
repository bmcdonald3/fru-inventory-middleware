        enabled: false
    storage:
        enabled: true
        type: file
        db_driver: sqlite3
    reconciliation:
        enabled: false
        worker_count: 5
        requeue_delay: 5
generation:
    handlers: true
    storage: true
    client: true
    openapi: true
    events: true
    middleware: true
    reconciliation: false
