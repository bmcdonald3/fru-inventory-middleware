project:
    name: smd-reconciler
    module: github.com/user/smd-reconciler
    created: 2026-07-21T13:49:37.803683-07:00
features:
    validation:
        enabled: true
        mode: strict
    events:
        enabled: true
        bus_type: memory
    conditional:
        enabled: true
        etag_algorithm: sha256
